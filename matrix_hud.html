<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MATRIX HUD">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>MATRIX HUD — Agent Operations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #d4af37;
  --gold-bright: #ffd700;
  --gold-dim: rgba(212,175,55,0.25);
  --card-bg: rgba(0,0,0,0.95);
  --text-box-bg: #000000;
}
html, body { background: #000; font-family: 'Share Tech Mono', monospace; color: #fff; height: 100%; min-height: 100vh; width: 100vw; overflow-x: hidden; overflow-y: auto; padding-top:0; margin:0; }
body { padding-top: constant(safe-area-inset-top, 0px); padding-top: env(safe-area-inset-top, 0px); }
#neural-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; opacity:0.3; }
#matrix-rain { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.12; }
.text-box { background:var(--text-box-bg); border:1px solid rgba(212,175,55,0.10); border-radius:2px; padding:2px 5px; margin:1px 0; animation:breathe-gold 3.5s ease-in-out infinite; }
@keyframes breathe-gold {
  0%,100% { border-color:rgba(212,175,55,0.08); box-shadow:0 0 5px rgba(212,175,55,0.03); }
  50% { border-color:rgba(212,175,55,0.30); box-shadow:0 0 15px rgba(212,175,55,0.08); }
}
.header { position:relative; z-index:2; padding:max(50px, constant(safe-area-inset-top, 50px), env(safe-area-inset-top, 50px)) 20px 8px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(212,175,55,0.10); min-height:50px; }
.header h1 { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:var(--gold); letter-spacing:3px; text-shadow:0 0 10px rgba(212,175,55,0.3); }
#clock { font-family:'Orbitron',monospace; font-size:11px; color:rgba(212,175,55,0.5); letter-spacing:2px; margin-left:20px; }
.header .status-bar { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:10px; color:rgba(255,255,255,0.35); }
.status-dot { width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1;box-shadow:0 0 6px var(--gold)} 50%{opacity:0.3;box-shadow:0 0 2px var(--gold)} }
.agents-grid { position:relative; z-index:2; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:8px 10px 40px; min-height:calc(100vh - 110px); height:auto; overflow:visible; }
.agents-grid::-webkit-scrollbar { width:4px; }
.agents-grid::-webkit-scrollbar-thumb { background:rgba(212,175,55,0.2); border-radius:2px; }
/* CARD */
.agent-card { background:var(--card-bg); border:1px solid rgba(212,175,55,0.06); border-radius:8px; display:flex; flex-direction:column; overflow:hidden; transition:all 0.3s, transform 0.15s; position:relative; cursor:default; will-change:transform; transform-style:preserve-3d; perspective:800px; }
.agent-card:hover { border-color:rgba(212,175,55,0.15); }
.agent-card.active { border-color:rgba(212,175,55,0.3); box-shadow:0 0 10px rgba(212,175,55,0.08); animation:breathe-card 3.5s ease-in-out infinite; }
@keyframes breathe-card {
  0%,100% { border-color:rgba(212,175,55,0.20); box-shadow:0 0 8px rgba(212,175,55,0.05); }
  50% { border-color:var(--gold); box-shadow:0 0 30px rgba(212,175,55,0.25); }
}
.agent-card.idle { opacity:0.9; }
.agent-card.done { border-color:rgba(212,175,55,0.25); box-shadow:0 0 15px rgba(212,175,55,0.08); }
.shockwave { position:absolute; top:50%; left:50%; width:0; height:0; border-radius:50%; background:rgba(212,175,55,0.08); transform:translate(-50%,-50%); pointer-events:none; z-index:20; }
.agent-card.active .shockwave { animation:shockwave 0.6s ease-out; }
@keyframes shockwave { 0%{width:0;height:0;opacity:0.6} 100%{width:600px;height:600px;opacity:0} }
/* PHOTO */
.agent-photo { width:100%; height:0; padding-bottom:38%; position:relative; overflow:hidden; flex-shrink:0; background:#000; border-bottom:1px solid rgba(212,175,55,0.05); }
.agent-photo img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transition:all 0.5s; }
.agent-card.idle .agent-photo img { filter:brightness(0.9); }
.agent-card.active .agent-photo img { filter:brightness(1.3) contrast(1.1); }
.agent-card.active .agent-photo { box-shadow:inset 0 0 60px rgba(212,175,55,0.06); }
.agent-photo-overlay { position:absolute; bottom:0; left:0; right:0; height:40%; background:linear-gradient(transparent, #000); z-index:6; }
.scan-beam { position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,transparent,rgba(212,175,55,0.4),var(--gold-bright),rgba(212,175,55,0.4),transparent); z-index:5; opacity:0; pointer-events:none; box-shadow:0 0 10px rgba(212,175,55,0.3); }
.agent-card.active .scan-beam { animation:scan-sweep 4s ease-in-out infinite; }
@keyframes scan-sweep { 0%{top:0;opacity:0} 5%{opacity:1} 48%{top:100%;opacity:1} 52%{opacity:0} 100%{top:100%;opacity:0} }
.glitch-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:4; pointer-events:none; overflow:hidden; opacity:0; }
.agent-card.active .glitch-overlay { animation:glitch-flash 8s infinite; }
@keyframes glitch-flash { 0%,85%,100%{opacity:0} 86%{opacity:1} 87%{opacity:0} 90%{opacity:0.6} 91%{opacity:0} 94%{opacity:0.3} 95%{opacity:0} }
.glitch-bar { position:absolute; left:0; width:100%; height:3px; background:rgba(212,175,55,0.5); transform:translateX(-100%); }
.glitch-bar:nth-child(1) { top:12%; animation:glitch-bar1 8s infinite; }
.glitch-bar:nth-child(2) { top:35%; animation:glitch-bar2 8s infinite; }
.glitch-bar:nth-child(3) { top:62%; animation:glitch-bar3 8s infinite; }
.glitch-bar:nth-child(4) { top:80%; animation:glitch-bar1 8s infinite 2s; }
@keyframes glitch-bar1 { 0%,89%,100%{transform:translateX(-100%)} 90%,92%{transform:translateX(0)} 93%{transform:translateX(-5%)} }
@keyframes glitch-bar2 { 0%,92.5%,100%{transform:translateX(-100%)} 93%,94%{transform:translateX(0)} 95%{transform:translateX(-3%)} }
@keyframes glitch-bar3 { 0%,87%,100%{transform:translateX(-100%)} 88%,89%{transform:translateX(0)} 90%{transform:translateX(-8%)} }
.photo-static { position:absolute; top:0; left:0; width:100%; height:100%; z-index:3; pointer-events:none; opacity:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:128px 128px; mix-blend-mode:overlay; }
.agent-card.active .photo-static { animation:static-flicker 8s infinite; }
@keyframes static-flicker { 0%,83%,100%{opacity:0} 84%,85%{opacity:0.15} 88%,89%{opacity:0.08} 92%,93%{opacity:0.12} 96%{opacity:0.05} }
.photo-badge { position:absolute; top:6px; right:6px; font-size:14px; z-index:6; opacity:0; transition:all 0.3s; }
.agent-card:not(.idle) .photo-badge { opacity:1; }
.agent-info { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.agent-name { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; letter-spacing:1px; transition:all 0.3s; }
.agent-card.active .agent-name { color:var(--gold); text-shadow:0 0 10px rgba(212,175,55,0.4); }
.agent-tagline { font-size:7px; color:rgba(255,255,255,0.6); letter-spacing:1px; text-transform:uppercase; }
.agent-status { font-size:7px; padding:1px 5px; border-radius:8px; text-transform:uppercase; letter-spacing:1px; margin-left:auto; flex-shrink:0; }
.agent-progress-row { text-align:center; padding:1px 0; flex-shrink:0; }
.agent-progress-row .pct { font-size:24px; font-weight:900; font-family:'Orbitron',monospace; letter-spacing:2px; text-shadow:0 0 20px rgba(212,175,55,0.25); line-height:1; }
.status-idle { color:rgba(255,255,255,0.25); border:1px solid rgba(255,255,255,0.06); }
.status-working { color:var(--gold-bright); border:1px solid var(--gold); background:rgba(212,175,55,0.06); animation:pulse-status 1.5s infinite; }
.status-done { color:var(--gold); border:1px solid var(--gold-dim); background:rgba(212,175,55,0.03); }
@keyframes pulse-status { 0%,100%{opacity:1} 50%{opacity:0.5} }
.agent-terminal { min-height:32px; max-height:32px; padding:2px 0; font-size:7px; line-height:1.3; text-align:left; overflow:hidden; font-family:'Share Tech Mono',monospace; flex-shrink:0; }
.agent-terminal .term-line { white-space:pre; overflow:hidden; }
.term-cmd { color:var(--gold); }
.term-output { color:rgba(212,175,55,0.55); }
.term-error { color:#ff4444; }
.cursor { display:inline-block; width:3px; height:10px; background:var(--gold); animation:blink 0.8s step-end infinite; vertical-align:middle; }
@keyframes blink { 50%{opacity:0} }
.agent-card.idle .agent-terminal .cursor { display:none; }
.agent-quote { font-size:9px; font-style:italic; min-height:18px; max-height:18px; overflow:hidden; color:rgba(255,255,255,0.6); flex-shrink:0; transition:all 0.4s; white-space:nowrap; text-overflow:ellipsis; }
.agent-card.active .agent-quote { color:var(--gold); }
.agent-card.done .agent-quote { color:var(--gold-dim); }
.agent-task { padding:2px 5px 3px; font-size:8px; color:rgba(255,255,255,0.6); line-height:1.2; overflow:hidden; max-height:20px; flex-shrink:0; }
.agent-card.active .agent-task { color:rgba(255,255,255,0.85); }
.scanlines { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(212,175,55,0.006) 2px,rgba(212,175,55,0.006) 4px); }
.agent-card.active .particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:0; }
.particle { position:absolute; width:2px; height:2px; border-radius:50%; animation:float-particle 4s infinite; }
@keyframes float-particle { 0%{transform:translateY(100%) scale(0);opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{transform:translateY(-20px) scale(1);opacity:0} }
.log-panel { position:fixed; bottom:0; left:0; width:100%; height:26px; background:#000; border-top:1px solid rgba(212,175,55,0.06); z-index:5; display:flex; align-items:center; padding:0 12px; font-size:10px; color:rgba(255,255,255,0.25); }
.log-text { color:var(--gold); margin-left:4px; overflow:hidden; white-space:nowrap; }
@media (min-width:701px) and (max-width:1100px) { .agents-grid { grid-template-columns:repeat(3,1fr); } }
@media (max-width:700px) { .agents-grid { grid-template-columns:repeat(2,1fr); gap:5px; padding:4px 4px 40px; } }
/* ===== MÓVIL (iPhone, < 600px) ===== */
@media (max-width:600px) {
  html, body { overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .agents-grid { grid-template-columns:repeat(2,1fr); gap:5px; padding:4px 4px 40px; }
  .agent-card { border-radius:6px; border-width:1px; }
  .agent-card.idle { opacity:0.7; }
  .agent-photo { padding-bottom:45%; }
  .agent-photo img { filter:brightness(0.8); object-fit:cover; }
  .shockwave { display:none !important; }
  .particles { display:none !important; }
  .glitch-overlay { display:none !important; }
  .photo-static { display:none !important; }
  .scan-beam { display:none !important; }
  .photo-badge { display:none !important; }
  .scanlines { display:none !important; }
  .text-box { padding:3px 5px; margin:2px 0; animation:none; border-color:rgba(212,175,55,0.10); }
  .agent-info { gap:4px; flex-wrap:wrap; }
  .agent-name { font-size:13px; letter-spacing:0.5px; }
  .agent-tagline { font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:0.3px; display:inline; margin-left:3px; }
  .agent-status { font-size:10px; padding:1px 6px; }
  .agent-progress-row .pct { font-size:28px; }
  .agent-terminal { display:none !important; }
  .agent-quote { display:none !important; }
  .agent-task { font-size:12px; max-height:36px; padding:2px 3px; line-height:1.3; }
  .header { padding:max(45px, constant(safe-area-inset-top, 45px), env(safe-area-inset-top, 45px)) 8px 6px; gap:6px; }
  .header h1 { font-size:14px; letter-spacing:1px; }
  #clock { font-size:9px; margin-left:8px; }
  .header .status-bar { font-size:9px; gap:4px; }
  .log-panel { display:none !important; }
  #neural-canvas { display:none !important; }
  #matrix-rain { display:none !important; }
  .scanlines { display:none !important; }
  .agent-card.active { border-width:2px; }
}
/* ===== MÓVIL GRANDE (600-900px) ===== */
@media (min-width:601px) and (max-width:900px) {
  .agents-grid { grid-template-columns:repeat(2,1fr); gap:6px; padding:6px 8px 40px; }
  .agent-photo { padding-bottom:35%; }
  .agent-name { font-size:14px; }
  .agent-tagline { font-size:10px; color:rgba(255,255,255,0.5); display:inline; margin-left:3px; }
  .agent-progress-row .pct { font-size:28px; }
  .agent-terminal { min-height:28px; max-height:28px; font-size:9px; }
  .agent-quote { display:none; }
  .agent-task { font-size:12px; }
  .header { padding:8px 12px 5px; }
  .header h1 { font-size:16px; }
}
/* ===== TABLET (901-1100px) ===== */
@media (min-width:901px) and (max-width:1100px) { .agents-grid { grid-template-columns:repeat(3,1fr); } }

/* ===== OVERLAY COMPLETADO ===== */
#completion-overlay { 
  display:none; 
  position:fixed; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%; 
  z-index:999; 
  background:#000; 
  cursor:pointer; 
  -webkit-animation:fadeInOverlay 0.8s ease-out;
  animation:fadeInOverlay 0.8s ease-out;
}
@keyframes fadeInOverlay { 0%{opacity:0} 100%{opacity:1} }
@-webkit-keyframes fadeInOverlay { 0%{opacity:0} 100%{opacity:1} }
@media (max-width:600px) {
  #completion-title { font-size:16vw !important; letter-spacing:4px !important; }
  #completion-sub { font-size:5vw !important; }
  #completion-tap { font-size:4vw !important; }
}

/* ===== MAPA DE OFICINA CYBERPUNK V2 ===== */
#office-map { display:none; position:relative; z-index:2; width:100%; height:calc(100vh - 110px); background:#0d0d12; overflow:hidden; min-height:420px; }
#office-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
/* Sprites de agentes */
.agent-sprite {
  position:absolute; z-index:20;
  width:clamp(36px,7vw,64px); height:clamp(36px,7vw,64px);
  border-radius:50%; overflow:hidden;
  border:2px solid rgba(212,175,55,0.3);
  transition:left 2.5s cubic-bezier(0.25,0.46,0.45,0.94), top 2.5s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.3s, filter 0.5s, border-color 0.5s;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  pointer-events:auto;
}
.agent-sprite img { width:100%; height:100%; object-fit:cover; }
.agent-sprite.idle { 
  border-color:rgba(100,100,100,0.2); 
  filter:brightness(0.5) saturate(0.3); 
  transform:scale(0.8); 
  transition:left 3s cubic-bezier(0.25,0.46,0.45,0.94), top 3s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.5s, filter 0.5s;
}
.agent-sprite.walking {
  border-color:#00ccff;
  box-shadow:0 0 20px rgba(0,204,255,0.2);
  filter:brightness(1.1);
  animation:sprite-walk 0.25s ease-in-out infinite alternate;
  z-index:30;
}
.agent-sprite.working {
  border-color:#00ff88;
  box-shadow:0 0 25px rgba(0,255,136,0.3), 0 0 60px rgba(0,255,136,0.1);
  filter:brightness(1.3);
  animation:sprite-breathe 2s ease-in-out infinite;
}
.agent-sprite.done {
  border-color:#ffd700;
  box-shadow:0 0 30px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.15);
  filter:brightness(1.4);
  transform:scale(1.08);
}
@keyframes sprite-walk {
  0% { transform:translateY(0) scale(1); }
  100% { transform:translateY(-3px) scale(1.02); }
}
@keyframes sprite-breathe {
  0%,100% { box-shadow:0 0 15px rgba(0,255,136,0.2); }
  50% { box-shadow:0 0 35px rgba(0,255,136,0.4), 0 0 70px rgba(0,255,136,0.1); }
}
.agent-name-tag {
  position:absolute; z-index:15;
  font-family:'Orbitron',monospace;
  font-size:clamp(6px,0.9vw,9px);
  color:rgba(255,255,255,0.7);
  text-align:center;
  width:clamp(50px,10vw,100px);
  left:50%; transform:translateX(-50%);
  top:calc(100% + 4px);
  pointer-events:none;
  white-space:nowrap;
  text-shadow:0 0 8px rgba(0,0,0,0.9);
  letter-spacing:1px;
  transition:color 0.5s;
}
.agent-sprite.working ~ .agent-name-tag { color:#00ff88; text-shadow:0 0 8px rgba(0,255,136,0.3); }
.agent-sprite.done ~ .agent-name-tag { color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,0.3); }
.agent-sprite.walking ~ .agent-name-tag { color:#00ccff; }
@media (max-width:600px) {
  .agent-sprite { width:clamp(28px,10vw,44px); height:clamp(28px,10vw,44px); border-width:1.5px; }
  .agent-name-tag { font-size:6px; }
}
/* Overlay completado - fix */
#completion-overlay { z-index:999 !important; }/* ===== TOGGLE VIEW ===== */
.view-toggle {
  display:flex; align-items:center; gap:4px;
  margin-left:auto; margin-right:10px;
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  flex-shrink:0;
}
.view-toggle .view-btn {
  padding:6px 14px; cursor:pointer;
  color:rgba(255,255,255,0.25);
  border:1px solid rgba(212,175,55,0.08);
  border-radius:4px;
  transition:all 0.3s;
  background:transparent;
  font-family:'Orbitron',monospace;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.view-toggle .view-btn.active { color:#d4af37; border-color:#d4af37; background:rgba(212,175,55,0.08); box-shadow:0 0 10px rgba(212,175,55,0.06); }
.view-toggle .view-btn:hover { color:rgba(255,255,255,0.5); }
@media (max-width:600px) {
  .view-toggle { margin-right:4px; gap:3px; }
  .view-toggle .view-btn { font-size:9px; padding:4px 10px; letter-spacing:0.5px; }
}
/* Hallway line */
.hallway-line {
  position:absolute; top:50%; left:5%; width:90%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.06),rgba(212,175,55,0.1),rgba(212,175,55,0.06),transparent);
}
</style>
</head>
<body>
<canvas id="neural-canvas"></canvas>
<canvas id="matrix-rain"></canvas>
<div class="scanlines"></div>
<!-- ===== OVERLAY COMPLETADO ===== -->
<div id="completion-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:#000;cursor:pointer;">
  <canvas id="overlay-rain" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.15;"></canvas>
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;">
    <div id="completion-title" style="font-family:'Orbitron',monospace;font-size:8vw;font-weight:900;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,0.5),0 0 80px rgba(212,175,55,0.3);letter-spacing:8px;opacity:0;transition:opacity 1.5s;">COMPLETADO</div>
    <div id="completion-sub" style="font-family:'Share Tech Mono',monospace;font-size:2.5vw;color:rgba(212,175,55,0.6);margin-top:30px;opacity:0;transition:opacity 2s 0.5s;">⋮ NEO.DEPT</div>
    <div id="completion-tap" style="font-family:'Share Tech Mono',monospace;font-size:1.5vw;color:rgba(255,255,255,0.2);margin-top:60px;opacity:0;transition:opacity 2s 2s;">toca la pantalla para continuar</div>
  </div>
</div>
<div class="header">
  <h1>⋮ NEO.DEPT</h1>
  <span id="clock">--:--:--</span>
  <div class="view-toggle">
    <span class="view-btn active" id="btn-grid" onclick="switchView('grid')">GRID</span>
    <span class="view-btn" id="btn-map" onclick="switchView('map')">MAP</span>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="connection-status">ONLINE</span>
    <span>|</span>

function drawNeuralNet(){
  nctx.clearRect(0,0,nCanvas.width,nCanvas.height);
  const cards=document.querySelectorAll('.agent-card.active');
  if(cards.length<2) return;
  const nodes=[];
  cards.forEach(c=>{const r=c.getBoundingClientRect();nodes.push({x:r.left+r.width/2,y:r.top+r.height/2});});
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,dist=Math.sqrt(dx*dx+dy*dy);
      const pulse=Math.sin(Date.now()/1500+dist/50)*0.5+0.5;
      nctx.beginPath(); nctx.moveTo(nodes[i].x,nodes[i].y);
      nctx.quadraticCurveTo((nodes[i].x+nodes[j].x)/2,Math.min(nodes[i].y,nodes[j].y)-20,nodes[j].x,nodes[j].y);
      nctx.strokeStyle=`rgba(212,175,55,${0.06+0.1*pulse})`; nctx.lineWidth=0.5+pulse; nctx.stroke();
      [{x:nodes[i].x,y:nodes[i].y},{x:nodes[j].x,y:nodes[j].y}].forEach(n=>{

let deskPositions = [];
let spriteElements = {};

const BREAK_CENTER = { x: 0.25, y: 0.88 }; // cafetería

function drawOffice() {
  const canvas = document.getElementById('office-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  
  // ===== FONDO PRINCIPAL (más brillante) =====
  ctx.fillStyle = '#121218';
  ctx.fillRect(0, 0, W, H);
  
  // ===== SUELO CON LOSETAS =====
  const tile = Math.max(24, W / 32);
  ctx.strokeStyle = 'rgba(212,175,55,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += tile) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += tile) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  
  // ===== DISTRIBUCIÓN =====
  // Área de trabajo: 0% - 68% de la altura
  // Pasillo: 68% - 72%
  // Área de descanso: 72% - 100%
  const workBottom = H * 0.65;
  const hallCenter = H * 0.70;
  const breakTop = H * 0.74;
  
  // ===== PASILLO CENTRAL (horizontal entre cubiculos y descanso) =====
  ctx.fillStyle = '#1a1a24';
  ctx.fillRect(0, H * 0.66, W, H * 0.08);
  ctx.strokeStyle = 'rgba(212,175,55,0.10)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 8]);
  ctx.beginPath(); ctx.moveTo(0, hallCenter); ctx.lineTo(W, hallCenter); ctx.stroke();
  ctx.setLineDash([]);
  
  // Líneas de luz de pasillo
  for (let x = W * 0.1; x < W * 0.9; x += W * 0.15) {
    ctx.fillStyle = 'rgba(255,215,0,0.04)';
    ctx.beginPath();
    ctx.arc(x, hallCenter, 8, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // ===== PASILLO VERTICAL ENTRE FILAS DE CUBÍCULOS =====
  const hallY = H * 0.36;
  ctx.fillStyle = '#1a1a24';
  ctx.fillRect(0, H * 0.34, W, H * 0.04);
  ctx.strokeStyle = 'rgba(212,175,55,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath(); ctx.moveTo(0, hallY); ctx.lineTo(W, hallY); ctx.stroke();
  ctx.setLineDash([]);
  
  // ===== CALCULAR POSICIONES DE PUESTOS =====
  deskPositions = [];
  const marginX = W * 0.05;
  const topAreaTop = H * 0.04;
  const topAreaH = H * 0.26;
  const botAreaTop = H * 0.40;
  const botAreaH = H * 0.26;
  const cols = 5;
  
  for (let row = 0; row < 2; row++) {
    const areaTop = row === 0 ? topAreaTop : botAreaTop;
    const areaH = row === 0 ? topAreaH : botAreaH;
    
    for (let col = 0; col < cols; col++) {
      const cx = marginX + (W - marginX * 2) * (col + 0.5) / cols;
      const cy = areaTop + areaH * 0.5;
      const deskW = (W - marginX * 2) / cols * 0.55;
      const deskH = areaH * 0.55;
      const x = cx - deskW / 2;
      const y = cy - deskH / 2;
      
      deskPositions.push({ cx, cy, x, y, w: deskW, h: deskH, row, col });
      
      // ===== CUBÍCULO =====
      const pad = deskW * 0.1;
      const alpha = 0.20; // más visible
      
      // Sombra del cubículo
      ctx.fillStyle = 'rgba(20,20,30,0.6)';
      ctx.fillRect(x - pad, y - pad, deskW + pad * 2, deskH + pad * 2);
      
      // Paredes del cubículo (neón)
      ctx.strokeStyle = `rgba(212,175,55,${alpha})`;
      ctx.lineWidth = 1.5;
      
      // Pared trasera (más gruesa)
      ctx.beginPath();
      ctx.moveTo(x - pad, y - pad);
      ctx.lineTo(x + deskW + pad, y - pad);
      ctx.stroke();
      
      // Pared izquierda
      ctx.beginPath();
      ctx.moveTo(x - pad, y - pad);
      ctx.lineTo(x - pad, y + deskH + pad);
      ctx.stroke();
      
      // Pared derecha
      ctx.beginPath();
      ctx.moveTo(x + deskW + pad, y - pad);
      ctx.lineTo(x + deskW + pad, y + deskH + pad);
      ctx.stroke();
      
      // ===== MESA =====
      const deskTop = y + deskH * 0.2;
      const dW = deskW * 0.8;
      const dH = deskH * 0.4;
      const dX = cx - dW / 2;
      
      ctx.fillStyle = '#222230';
      ctx.fillRect(dX, deskTop, dW, dH);
      ctx.strokeStyle = 'rgba(212,175,55,0.10)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(dX, deskTop, dW, dH);
      
      // ===== MONITOR =====
      const mW = dW * 0.3;
      const mH = dH * 0.5;
      const mX = cx - mW / 2;
      const mY = deskTop - mH + 2;
      
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(mX, mY, mW, mH);
      ctx.strokeStyle = 'rgba(0,255,136,0.15)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(mX, mY, mW, mH);
      
      // Brillo de pantalla (código Matrix)
      const seed = col * 7 + row * 13;
      for (let i = 0; i < 5; i++) {
        const lx = mX + 3 + ((seed * 3 + i * 7) % parseInt(mW - 6));
        const ly = mY + 4 + i * (mH - 8) / 6;
        ctx.fillStyle = `rgba(0,255,136,${0.06 + (i % 3) * 0.04})`;
        ctx.fillRect(lx, ly, 3 + (i % 4) * 2, 1.2);
      }
      
      // Soporte monitor
      ctx.fillStyle = '#333';
      ctx.fillRect(cx - 2, deskTop, 4, 4);
      
      // ===== SILLA =====
      const chairY = deskTop + dH + 6;
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(cx, chairY, dW * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(212,175,55,0.04)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
  
  // ===== LUCES DE TECHO =====
  for (let i = 0; i < 6; i++) {
    const lx = W * (0.1 + i * 0.16);
    ctx.fillStyle = 'rgba(255,215,0,0.02)';
    ctx.fillRect(lx - 15, 2, 30, 6);
    ctx.fillStyle = 'rgba(255,215,0,0.03)';
    ctx.beginPath();
    ctx.moveTo(lx - 20, 6);
    ctx.lineTo(lx + 20, 6);
    ctx.lineTo(lx + 12, 20);
    ctx.lineTo(lx - 12, 20);
    ctx.fill();
  }
  
  // ===== ZONA DE DESCANSO (CAFETERÍA + GAMING) =====
  const bTop = H * 0.76;
  const bH = H * 0.22;
  const bMargin = W * 0.03;
  const halfW = (W - bMargin * 3) / 2;
  
  // --- CAFETERÍA (izquierda) ---
  const cafeX = bMargin;
  const cafeW = halfW;
  ctx.fillStyle = '#1a1a10';
  ctx.fillRect(cafeX, bTop, cafeW, bH);
  ctx.strokeStyle = 'rgba(212,175,55,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(cafeX, bTop, cafeW, bH);
  
  // Letrero CAFETERÍA
  ctx.fillStyle = 'rgba(212,175,55,0.15)';
  ctx.font = `${Math.max(8, Math.min(14, W/60))}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText('☕ BREAK', cafeX + cafeW / 2, bTop + 16);
  
  // Mesas de cafetería
  for (let i = 0; i < 3; i++) {
    const tx = cafeX + cafeW * (0.2 + i * 0.3);
    const ty = bTop + bH * 0.5;
    ctx.fillStyle = '#2a2a20';
    ctx.fillRect(tx - 10, ty - 6, 20, 12);
    ctx.strokeStyle = 'rgba(212,175,55,0.06)';
    ctx.strokeRect(tx - 10, ty - 6, 20, 12);
    // Sillas alrededor
    for (let s = 0; s < 3; s++) {
      const angle = s * 2.1 + 0.5;
      const sx = tx + Math.cos(angle) * 16;
      const sy = ty + Math.sin(angle) * 16;
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(sx, sy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // --- GAMING ZONE (derecha) ---
  const gameX = bMargin * 2 + halfW;
  const gameW = halfW;
  ctx.fillStyle = '#10101a';
  ctx.fillRect(gameX, bTop, gameW, bH);
  ctx.strokeStyle = 'rgba(0,200,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(gameX, bTop, gameW, bH);
  
  // Letrero GAMING
  ctx.fillStyle = 'rgba(0,200,255,0.15)';
  ctx.font = `${Math.max(8, Math.min(14, W/60))}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText('🎮 GAMING', gameX + gameW / 2, bTop + 16);
  
  // Sofás / mesas
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(gameX + gameW * 0.15, bTop + bH * 0.35, gameW * 0.3, 14);
  ctx.fillRect(gameX + gameW * 0.55, bTop + bH * 0.35, gameW * 0.3, 14);
  
  // Pantalla grande (neón)
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(gameX + gameW * 0.35, bTop + bH * 0.55, gameW * 0.3, bH * 0.3);
  ctx.strokeStyle = 'rgba(0,200,255,0.15)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(gameX + gameW * 0.35, bTop + bH * 0.55, gameW * 0.3, bH * 0.3);
  // Brillo pantalla
  ctx.fillStyle = 'rgba(0,200,255,0.03)';
  ctx.fillRect(gameX + gameW * 0.37, bTop + bH * 0.57, gameW * 0.26, bH * 0.2);
  
  // ===== NEO.DEPT en la parte superior =====
  ctx.fillStyle = 'rgba(212,175,55,0.06)';
  ctx.font = `${Math.max(7, Math.min(12, W/70))}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText('⋮ NEO.DEPT', W / 2, 14);
  
  // ===== SCANLINES =====
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
}

  spriteElements = {};
  agentStates = {};
  
  agents.forEach((agent, idx) => {
    const sprite = document.createElement('div');
    sprite.className = 'agent-sprite';
    sprite.id = 'sprite-' + agent.id;
    sprite.innerHTML = `<img src="${agent.photo}" alt="${agent.name}" onerror="this.style.display='none'">`;
    container.appendChild(sprite);
    
    const tag = document.createElement('div');
    tag.className = 'agent-name-tag';
    tag.textContent = agent.name;
    container.appendChild(tag);
    
    spriteElements[agent.id] = { el: sprite, tag: tag, idx: idx };
    agentStates[agent.id] = 'idle';
    
    // Posición inicial: zona de descanso
    const isLeft = idx < 5;
    const rx = Math.random() * 0.3 + (isLeft ? 0.08 : 0.55);
    const ry = 0.80 + Math.random() * 0.10;
    
    sprite.style.left = '0px';
    sprite.style.top = '0px';
    sprite.classList.add('idle');
    sprite._targetX = 0; sprite._targetY = 0;
    
    // Posicionar al inicio
    setTimeout(() => placeAgentInBreak(agent.id, true), idx * 50);
  });
}

function placeAgentInBreak(agentId, instant) {
  const se = spriteElements[agentId];
  if (!se) return;
  const { el, tag, idx } = se;
  const isLeft = idx < 5;
  const canvas = document.getElementById('office-canvas');
  if (!canvas) return;
  const W = canvas.width || window.innerWidth;
  const H = canvas.height || (window.innerHeight - 160);
  
  // Posición aleatoria en la zona de descanso correspondiente
  const areaX = isLeft ? 0.08 : 0.53;
  const rx = areaX + Math.random() * 0.32;
  const ry = 0.78 + Math.random() * 0.14;
  
  const px = rx * W;
  const py = ry * H;
  
  if (instant) {
    el.style.transition = 'none';
    el.style.left = px + 'px';
    el.style.top = py + 'px';
    el.style.transform = 'translate(-50%,-50%)';
    tag.style.left = px + 'px';
    tag.style.top = (py + 20) + 'px';
    tag.style.transform = 'translateX(-50%)';
    el.offsetHeight;
    el.style.transition = '';
  }
  el._targetX = px;
  el._targetY = py;
}

// ===== ANIMAR AGENTE A SU PUESTO =====
function animateToDesk(agentId) {
  const se = spriteElements[agentId];
  if (!se || deskPositions.length === 0) return;
  const { el, tag, idx } = se;
  if (idx >= deskPositions.length) return;
  const pos = deskPositions[idx];
  const canvas = document.getElementById('office-canvas');
  if (!canvas) return;
  const W = canvas.width;
  const H = canvas.height;
  
  // 1. Primero mover a la entrada del pasillo
  const hallX = pos.cx;
  const hallY = H * 0.72; // entrada del pasillo horizontal
  
  el.classList.remove('idle', 'working', 'done');
  el.classList.add('walking');
  
  // Mover al pasillo primero (transición rápida)
  el.style.left = hallX + 'px';
  el.style.top = hallY + 'px';
  el.style.transform = 'translate(-50%,-50%)';
  tag.style.left = hallX + 'px';
  tag.style.top = (hallY + 20) + 'px';
  
  // 2. Luego subir al cubiculo
  setTimeout(() => {
    el.style.left = pos.cx + 'px';
    el.style.top = (pos.cy - 5) + 'px';
    tag.style.left = pos.cx + 'px';
    tag.style.top = (pos.cy + 18) + 'px';
    
    // 3. Llegó!
    setTimeout(() => {
      el.classList.remove('walking');
      el.classList.add('working');
      el.style.top = (pos.cy - 5) + 'px';
      el._targetX = pos.cx;
      el._targetY = pos.cy - 5;
    }, 2200);
  }, 2200);
}

// ===== ANIMAR AGENTE A ZONA DE DESCANSO =====
function animateToBreak(agentId) {
  const se = spriteElements[agentId];
  if (!se) return;
  const { el, tag, idx } = se;
  const canvas = document.getElementById('office-canvas');
  if (!canvas) return;
  const H = canvas.height;
  
  // Ir al pasillo primero
  const hallY = H * 0.72;
  
  el.classList.remove('working', 'done');
  el.classList.add('walking');
  
  // Bajar al pasillo
  el.style.top = hallY + 'px';
  
  setTimeout(() => {
    // Luego a zona de descanso
    placeAgentInBreak(agentId, false);
    el.classList.remove('walking');
    el.classList.add('idle');
  }, 2500);
}

// ===== ACTUALIZAR SPRITE =====
function updateAgentSprite(agentId, newStatus, task) {
  const se = spriteElements[agentId];
  if (!se) return;
  const { el, tag } = se;
  const prev = agentStates[agentId];
  if (prev === newStatus) return;
  
  agentStates[agentId] = newStatus;
  
  if (newStatus === 'working' && prev === 'idle') {
    // De descanso → a trabajar: caminar al puesto
    animateToDesk(agentId);
  } else if (newStatus === 'idle' && (prev === 'working' || prev === 'done')) {
    // De trabajo → descanso: volver
    animateToBreak(agentId);
  } else if (newStatus === 'done') {
    el.classList.remove('idle', 'walking', 'working');
    el.classList.add('done');
  } else if (newStatus === 'working') {
    el.classList.remove('idle', 'walking', 'done');
    el.classList.add('working');
  } else if (newStatus === 'idle') {
    el.classList.remove('working', 'done', 'walking');
    el.classList.add('idle');
    if (!el._targetX) placeAgentInBreak(agentId, true);
  }
}

// ===== PARCHAR updateAgent =====
updateAgent = (function(orig) {
  return function(agentId, newStatus, task, subtitle, progress, fromServer) {
    orig(agentId, newStatus, task, subtitle, progress, fromServer);
    updateAgentSprite(agentId, newStatus, task);
  };
})(updateAgent);

// ===== VIEW SWITCHING =====
function switchView(view) {
  const grid = document.getElementById('agents-grid');
  const map = document.getElementById('office-map');
  const btnGrid = document.getElementById('btn-grid');
  const btnMap = document.getElementById('btn-map');
  if (!grid || !map) return;
  if (view === 'grid') {
    grid.style.display = 'grid';
    map.style.display = 'none';
    btnGrid.classList.add('active');
    btnMap.classList.remove('active');
  } else {
    grid.style.display = 'none';
    map.style.display = 'block';
    btnGrid.classList.remove('active');
    btnMap.classList.add('active');
    drawOffice();
    if (Object.keys(spriteElements).length === 0) createAgentSprites();
  }
}

// Resize handler
window.addEventListener('resize', () => {
  if (document.getElementById('office-map').style.display === 'block') {
    drawOffice();
  }
});

// Inicializar
setTimeout(() => {
  drawOffice();
  createAgentSprites();
}, 300);
// Los agentes se actualizan vía pollStatus() con datos reales del monitor
// Terminal, quotes, etc
function startTerminal(agentId) {
  const term=document.getElementById('term-'+agentId); if(!term) return;
  const agent=agents.find(a=>a.id===agentId); if(!agent) return;
  if(termIntervals[agentId]) clearInterval(termIntervals[agentId]);
  let idx=0;
  function tick(){const lines=agent.code;term.innerHTML='';for(let i=-2;i<=0;i++){const li=lines[(idx+i+lines.length)%lines.length];if(!li)continue;const t=li.startsWith('$')?'term-cmd':li.startsWith('>>')?'term-output':li.includes('BUG')||li.includes('FAIL')?'term-error':'term-cmd';const d=document.createElement('div');d.className='term-line '+t;d.textContent=li.startsWith('$')?'$ '+li.slice(2).trim():li.startsWith('>')?'> '+li.slice(1).trim():li;term.appendChild(d);}const c=document.createElement('span');c.className='cursor';term.appendChild(c);idx++;}
  tick(); termIntervals[agentId]=setInterval(tick,900);
}
function stopTerminal(agentId){if(termIntervals[agentId]){clearInterval(termIntervals[agentId]);delete termIntervals[agentId];}const term=document.getElementById('term-'+agentId);if(term) term.innerHTML='<div class="term-output">⏣ idle</div>';}
function startQuotes(agentId){const el=document.getElementById('quote-'+agentId);if(!el)return;const agent=agents.find(a=>a.id===agentId);if(!agent)return;if(quoteIntervals[agentId])clearInterval(quoteIntervals[agentId]);let idx=Math.floor(Math.random()*agent.quotes.length);el.textContent=agent.quotes[idx];quoteIntervals[agentId]=setInterval(()=>{idx=(idx+1)%agent.quotes.length;el.textContent=agent.quotes[idx];},4000);}
function stopQuotes(agentId){if(quoteIntervals[agentId]){clearInterval(quoteIntervals[agentId]);delete quoteIntervals[agentId];}const el=document.getElementById('quote-'+agentId);if(el&&statuses[agentId]&&statuses[agentId].status==='idle')el.textContent='⏣ esperando ordenes...';}
function animateProgress(element, target) {
  if (!element) return;
  const current = parseInt(element.textContent) || 0;
  if (current === target) return; // No animar si ya está en el valor
  // Animación suave: 10 pasos a 100ms = 1 segundo
  const diff = target - current;
  const steps = Math.min(Math.abs(diff), 10);
  const stepSize = diff / steps;
  let step = 0;
  if (progressIntervals[element.id]) clearInterval(progressIntervals[element.id]);
  progressIntervals[element.id] = setInterval(() => {
    step++;
    const val = Math.round(current + stepSize * step);
    element.textContent = Math.min(100, Math.max(0, val)) + '%';
    if (step >= steps) {
      clearInterval(progressIntervals[element.id]);
      delete progressIntervals[element.id];
      element.textContent = target + '%';
    }
  }, 100);
}
function updateAgent(agentId, newStatus, task, subtitle, progress, fromServer) {
  // fromServer=true → no auto-idle, no reiniciar animación si el estado no cambió
  const card = document.getElementById('card-' + agentId);
  const statusEl = document.getElementById('status-' + agentId);
  const taskEl = document.getElementById('task-' + agentId);
  const quoteEl = document.getElementById('quote-' + agentId);
  const progressEl = document.getElementById('progress-' + agentId);
  if (!card) return;
  
  card.classList.remove('idle', 'active', 'done');
  statuses[agentId] = { status: newStatus, task, subtitle, progress: progress || 0 };
  
  const pct = Math.min(100, Math.max(0, progress || 0));
  // Cambiar indicador: 🟢 trabajando ⚪ idle 🟡 completado
  switch (newStatus) {
    case 'idle':
      card.classList.add('idle');
      statusEl.className = 'agent-status status-idle';
      statusEl.innerHTML = '●';
      statusEl.style.color = '#666';
      taskEl.textContent = '';
      stopTerminal(agentId);
      stopQuotes(agentId);
      if (quoteEl) quoteEl.textContent = '⏣ esperando ordenes...';
      if (progressEl) {
        progressEl.textContent = '0%';
        progressEl.style.opacity = '0.3';
      }
      break;
    case 'working':
      card.classList.add('active');
      statusEl.className = 'agent-status status-working';
      statusEl.innerHTML = '●';
      statusEl.style.color = '#00ff88';
      statusEl.style.textShadow = '0 0 8px #00ff88';
      taskEl.textContent = task || '';
      const sw = card.querySelector('.shockwave');
      if (sw) { sw.style.animation = 'none'; void sw.offsetWidth; sw.style.animation = ''; }
      generateParticles(agentId);
      startTerminal(agentId);
      startQuotes(agentId);
      updateLog(agentId, task || '');
      if (progressEl) animateProgress(progressEl, pct);
      break;
    case 'done':
      card.classList.add('done');
      statusEl.className = 'agent-status status-done';
      statusEl.innerHTML = '●';
      statusEl.style.color = '#ffd700';
      statusEl.style.textShadow = '0 0 8px #ffd700';
      taskEl.textContent = task || '✓ completado';
      stopTerminal(agentId);
      stopQuotes(agentId);
      if (quoteEl) quoteEl.textContent = '✓ ' + (task || 'tarea completada');
      const term = document.getElementById('term-' + agentId);
      if (term) term.innerHTML = '<div class="term-output">✓ completo</div>';
      if (progressEl) {
        progressEl.textContent = pct + '%';
        progressEl.style.opacity = '1';
      }
      // Solo auto-idle si NO viene del servidor (para no competir con pollStatus)
      if (!fromServer) setTimeout(() => updateAgent(agentId, 'idle', '', '', 0), 5000);
      break;
  }
  updateActiveCount();
}
function generateParticles(agentId){const c=document.getElementById('particles-'+agentId);if(!c)return;c.innerHTML='';for(let i=0;i<6;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*3+'s';p.style.background=['#d4af37','#ffd700','#fff'][Math.floor(Math.random()*3)];c.appendChild(p);}}
function updateActiveCount(){document.getElementById('active-count').textContent=Object.values(statuses).filter(s=>s.status==='working').length+' ACTIVE';}
function updateLog(agentId,task){const a=agents.find(x=>x.id===agentId);document.getElementById('log-text').textContent=`[${new Date().toLocaleTimeString()}] ${a.emoji} ${a.name} → ${task}`;}
// Poll — evitar re-animaciones comparando con último estado
async function pollStatus() {
  try {
    const r = await fetch('/status');
    if (!r.ok) return;
    const d = await r.json();
    if (Array.isArray(d)) d.forEach(u => {
      if (!u.agent || !u.status) return;
      // Comparar con último estado del servidor para evitar re-aplicar
      const key = u.agent;
      const prev = lastServerState[key];
      if (prev && prev.status === u.status && prev.progress === u.progress && prev.task === u.task) return;
      lastServerState[key] = { status: u.status, progress: u.progress, task: u.task };
      updateAgent(u.agent, u.status, u.task || '', '', u.progress || 0, true);
      // Check overlay from server updates too
      setTimeout(checkAllDone, 500);
    });
    document.getElementById('connection-status').textContent = 'ONLINE';
  } catch(e) {}
}
setInterval(pollStatus,2000);
window.addEventListener('resize', ()=>{rainCanvas.width=window.innerWidth;rainCanvas.height=window.innerHeight;nCanvas.width=window.innerWidth;nCanvas.height=window.innerHeight;});
window.matrixHUD = { updateAgent, agents };

// ===== OVERLAY COMPLETADO =====
let overlayActive = false;
let overlayRainInterval = null;
function showCompletionOverlay() {
  const overlay = document.getElementById('completion-overlay');
  if (!overlay || overlayActive) return;
  overlayActive = true;
  overlay.style.display = 'block';
  // Iniciar lluvia en overlay
  const oc = document.getElementById('overlay-rain');
  if (oc) {
    const octx = oc.getContext('2d');
    oc.width = window.innerWidth;
    oc.height = window.innerHeight;
    const ochars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
    const ofont = 16;
    const ocols = oc.width / ofont;
    const odrops = Array(Math.floor(ocols)).fill(1);
    if (overlayRainInterval) clearInterval(overlayRainInterval);
    overlayRainInterval = setInterval(() => {
      octx.fillStyle = 'rgba(0,0,0,0.05)';
      octx.fillRect(0, 0, oc.width, oc.height);
      octx.font = ofont + 'px monospace';
      for (let i = 0; i < odrops.length; i++) {
        octx.fillStyle = Math.random() > 0.98 ? '#ffd700' : '#d4af37';
        octx.fillText(ochars[Math.floor(Math.random() * ochars.length)], i * ofont, odrops[i] * ofont);
        if (odrops[i] * ofont > oc.height && Math.random() > 0.975) odrops[i] = 0;
        odrops[i]++;
      }
    }, 50);
  }
  // Animar texto
  setTimeout(() => {
    document.getElementById('completion-title').style.opacity = '1';
  }, 200);
  setTimeout(() => {
    document.getElementById('completion-sub').style.opacity = '1';
  }, 700);
  setTimeout(() => {
    document.getElementById('completion-tap').style.opacity = '1';
  }, 2500);
}
function hideCompletionOverlay() {
  const overlay = document.getElementById('completion-overlay');
  if (!overlay || !overlayActive) return;
  overlayActive = false;
  if (overlayRainInterval) { clearInterval(overlayRainInterval); overlayRainInterval = null; }
  overlay.style.display = 'none';
  // Resetear opacidades
  document.getElementById('completion-title').style.opacity = '0';
  document.getElementById('completion-sub').style.opacity = '0';
  document.getElementById('completion-tap').style.opacity = '0';
  // Resetear TODOS los agentes a idle 0%
  agents.forEach(a => {
    updateAgent(a.id, 'idle', '', '', 0);
    lastServerState[a.id] = { status: 'idle', progress: 0, task: '' };
  });
  document.getElementById('log-text').textContent = '⏣ sistema reiniciado · esperando ordenes...';
}
// Detectar cuando todos los agentes completan
function checkAllDone() {
  if (overlayActive) return;
  const working = Object.values(statuses).filter(s => s.status === 'working').length;
  if (working === 0) {
    // Verificar si al menos uno hizo algo (no todos idle)
    const anyDone = Object.values(statuses).some(s => s.status === 'done');
    if (anyDone) {
      setTimeout(showCompletionOverlay, 800);
    }
  }
}
// Parchar updateAgent para detectar completado
const _origUpdateAgent = updateAgent;
updateAgent = function(agentId, newStatus, task, subtitle, progress, fromServer) {
  _origUpdateAgent(agentId, newStatus, task, subtitle, progress, fromServer);
  if (newStatus === 'done') {
    // Chequear si todos terminaron
    setTimeout(checkAllDone, 100);
  }
};
// Tap en overlay para cerrar
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('completion-overlay');
  if (overlay) overlay.addEventListener('click', hideCompletionOverlay);
});
